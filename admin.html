<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visos Keratin — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#7A6230;--black:#0A0A0A;--dark:#141414;--dark2:#1E1C19;--dark3:#2A2720;--border:rgba(201,168,76,0.22);--border-b:rgba(201,168,76,0.5);--muted:rgba(201,168,76,0.5);--text:#e8dcc8;--r:4px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 15% 10%,rgba(201,168,76,0.06) 0%,transparent 70%),radial-gradient(ellipse 40% 50% at 85% 90%,rgba(201,168,76,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;}
#login-screen{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-box{width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-icon{width:60px;height:60px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:24px;color:var(--gold);}
.login-name{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;letter-spacing:6px;color:var(--gold-light);display:block;}
.login-sub{font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:6px;display:block;}
.login-card{background:var(--dark2);border:0.5px solid var(--border);border-radius:8px;padding:2rem;}
.login-card h2{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;text-align:center;}
.field{margin-bottom:1.25rem;}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.field input{width:100%;background:var(--dark);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:rgba(232,220,200,0.2);}
.btn-login{width:100%;padding:13px;background:var(--gold);color:var(--black);border:none;border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;margin-top:.5rem;}
.btn-login:hover{opacity:.88;}
.login-error{display:none;text-align:center;font-size:12px;color:#E24B4A;margin-top:1rem;}
.login-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:1.5rem;}
#app{display:none;position:relative;z-index:1;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.5rem;border-bottom:0.5px solid var(--border);background:var(--dark);}
.tb-logo{display:flex;align-items:center;gap:10px;}
.tb-badge{width:34px;height:34px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:15px;}
.tb-name{font-size:14px;font-weight:500;color:var(--gold-light);}
.tb-role{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.tb-right{display:flex;align-items:center;gap:1rem;}
.tb-time strong{display:block;font-size:13px;color:var(--text);}
.tb-time span{font-size:12px;color:var(--muted);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ADE80;margin-right:6px;animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.btn-logout{padding:6px 14px;background:transparent;border:0.5px solid var(--border);border-radius:var(--r);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;}
.btn-logout:hover{border-color:var(--border-b);color:var(--text);}
.nav{display:flex;border-bottom:0.5px solid var(--border);background:var(--dark);}
.nt{padding:11px 18px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;font-family:'Montserrat',sans-serif;}
.nt:hover{color:var(--text);}
.nt.on{color:var(--gold);border-bottom-color:var(--gold);}
.panel{display:none;padding:1.5rem;max-width:900px;margin:0 auto;}
.panel.on{display:block;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem;}
.met{background:var(--dark2);border-radius:var(--r);padding:1rem;}
.met-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.met-val{font-size:26px;font-weight:500;color:var(--text);}
.met-val.g{color:var(--gold);}
.met-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.sec-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--border);}
.cc{background:var(--dark2);border:0.5px solid var(--border);border-radius:6px;padding:1rem 1.25rem;margin-bottom:8px;display:grid;grid-template-columns:3px 1fr auto;gap:12px;align-items:start;transition:border-color .2s;}
.cc:hover{border-color:var(--border-b);}
.cc.new-cita{animation:highlightNew 2s ease;}
@keyframes highlightNew{0%{border-color:var(--gold);background:rgba(201,168,76,0.1);}100%{border-color:var(--border);background:var(--dark2);}}
.cc-bar{width:3px;border-radius:2px;align-self:stretch;min-height:48px;}
.bar-p{background:var(--gold);}
.bar-c{background:#639922;}
.bar-x{background:#A32D2D;}
.cc-nom{font-size:14px;font-weight:400;color:var(--text);margin-bottom:3px;}
.cc-inf{font-size:12px;color:var(--muted);line-height:1.6;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:500;margin-top:4px;}
.bp{background:rgba(201,168,76,0.12);color:var(--gold);}
.bc{background:rgba(99,153,34,0.15);color:#97C459;}
.bx{background:rgba(163,45,45,0.15);color:#F09595;}
.acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.ab{padding:4px 10px;border-radius:var(--r);border:0.5px solid var(--border);background:transparent;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;font-family:'Montserrat',sans-serif;}
.ab:hover{border-color:var(--border-b);color:var(--text);}
.ab.ok:hover{border-color:#639922;color:#97C459;}
.ab.del:hover{border-color:#A32D2D;color:#F09595;}
.cc-hora{font-size:14px;font-weight:500;color:var(--gold);text-align:right;white-space:nowrap;}
.cc-fin{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
.cc-precio{font-size:12px;color:var(--gold-light);text-align:right;margin-top:5px;}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.fb{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;font-size:11px;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'Montserrat',sans-serif;}
.fb:hover{border-color:var(--border-b);}
.fb.on{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold);}
.sw{position:relative;margin-bottom:1rem;}
.sw input{width:100%;background:var(--dark2);border:0.5px solid var(--border);border-radius:var(--r);padding:11px 14px 11px 36px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .2s;}
.sw input:focus{border-color:var(--gold);}
.sw input::placeholder{color:rgba(232,220,200,0.2);}
.sw-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.staff-card{background:var(--dark2);border:0.5px solid var(--border);border-radius:6px;padding:1.25rem;margin-bottom:10px;}
.sr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
.sl2{display:flex;align-items:center;gap:12px;}
.sa{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;border:1px solid var(--border);}
.sn{font-size:14px;font-weight:400;color:var(--text);}
.srl{font-size:11px;color:var(--muted);}
.sv{font-size:20px;font-weight:500;color:var(--gold);}
.sl3{font-size:11px;color:var(--muted);}
.tl{position:relative;padding-left:14px;}
.tl::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:var(--border);}
.tli{position:relative;padding:0 0 1rem 1.25rem;}
.tld{position:absolute;left:-5px;top:4px;width:10px;height:10px;border-radius:50%;border:1.5px solid var(--gold);background:var(--dark);}
.tlt{font-size:10px;color:var(--gold);letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase;}
.tlx{font-size:13px;color:var(--text);}
.tls{font-size:11px;color:var(--muted);}
.modal-wrap{display:none;background:rgba(0,0,0,0.75);position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;}
.modal-wrap.open{display:flex;}
.modal{background:var(--dark2);border:0.5px solid var(--border);border-radius:8px;padding:1.5rem;width:100%;max-width:420px;margin:1rem;}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--gold-light);margin-bottom:1.25rem;}
.mfield{margin-bottom:1rem;}
.mfield label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.mfield input,.mfield select{width:100%;background:var(--dark);border:0.5px solid var(--border);border-radius:var(--r);padding:11px 13px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .2s;}
.mfield input:focus,.mfield select:focus{border-color:var(--gold);}
.mfield select option{background:var(--dark2);}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;}
.btn-g{flex:1;padding:12px;background:var(--gold);color:var(--black);border:none;border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.btn-g:hover{opacity:.88;}
.btn-gh{flex:1;padding:12px;background:transparent;color:var(--muted);border:0.5px solid var(--border);border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-gh:hover{border-color:var(--border-b);color:var(--text);}
.btn-add{padding:9px 18px;background:rgba(201,168,76,0.1);border:0.5px solid var(--gold);border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:all .2s;margin-bottom:1.25rem;}
.btn-add:hover{background:rgba(201,168,76,0.18);}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--dark2);border:0.5px solid var(--gold);border-radius:var(--r);padding:12px 18px;font-size:13px;color:var(--text);z-index:999;display:none;}
.toast.show{display:block;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ══════════════════════════════════════════════════════
// 🔧 MISMA configuración que en visos-keratin.html
// ══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyC4TtVL7HM5ZQUGnqQZMCrTz_xtipUmU1Y",
  authDomain: "visos-keratin.firebaseapp.com",
  databaseURL: "https://visos-keratin-default-rtdb.firebaseio.com",
  projectId: "visos-keratin",
  storageBucket: "visos-keratin.firebasestorage.app",
  messagingSenderId: "793810207482",
  appId: "1:793810207482:web:80f771072a782b085c3f43",
  measurementId: "G-WHSWW1W9P0"
};
// ══════════════════════════════════════════════════════

let db = null;
let firebaseOk = false;
let unsubscribe = null;

try {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  firebaseOk = true;
} catch(e) {
  console.warn("Firebase no configurado — modo demo");
}

// Escucha cambios en tiempo real
window._listenCitas = function(callback) {
  if (!firebaseOk || !db) { callback([]); return; }
  const citasRef = ref(db, 'citas');
  onValue(citasRef, (snap) => {
    if (!snap.exists()) { callback([]); return; }
    const raw = snap.val();
    const lista = Object.entries(raw).map(([key, val]) => ({...val, _firebaseKey: key}));
    callback(lista);
  });
};

window._updateCita = async function(key, campos) {
  if (!firebaseOk || !db || !key) return;
  try {
    await update(ref(db, 'citas/' + key), campos);
  } catch(e) { console.error("Error actualizando:", e); }
};

window._pushCita = async function(cita) {
  if (!firebaseOk || !db) return null;
  try {
    const r = await push(ref(db, 'citas'), cita);
    return r.key;
  } catch(e) { console.error("Error guardando:", e); return null; }
};
</script>

}

function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('inp-user').value='';
  document.getElementById('inp-pass').value='';
  document.getElementById('login-err').style.display='none';
}

function initApp(){
  tickReloj(); setInterval(tickReloj,15000);
  // Escuchar Firebase en tiempo real
  if(window._listenCitas){
    window._listenCitas(function(citas){
      const esPrimera=CITAS.length===0;
      if(citas.length===0 && esPrimera){ CITAS=[...DEMO]; }
      else if(citas.length>0){
        // Detectar citas nuevas para animarlas
        if(!esPrimera){
          const keysAnteriores=new Set(CITAS.map(c=>c._firebaseKey));
          citas.filter(c=>!keysAnteriores.has(c._firebaseKey)).forEach(c=>{
            toast('Nueva cita: '+c.nombre+' – '+c.servicio);
            LOG.unshift({t:hora(),x:'Nueva cita agendada online',s:c.nombre+' · '+c.servicio+' · '+c.horaInicio});
          });
        }
        CITAS=citas;
      }
      renderAll();
    });
  } else { CITAS=[...DEMO]; renderAll(); }
}

function hora(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}

function tickReloj(){
  const n=new Date();
  document.getElementById('fecha-top').textContent=DIAS[n.getDay()]+' '+n.getDate()+' '+MESES[n.getMonth()];
  document.getElementById('hora-top').textContent=hora();
}

function addMins(t,m){const[h,min]=t.split(':').map(Number);const tot=h*60+min+m;return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');}
function barC(e){return e==='confirmada'?'bar-c':e==='cancelada'?'bar-x':'bar-p';}
function badgeC(e){return e==='confirmada'?'bc':e==='cancelada'?'bx':'bp';}
function badgeL(e){return e==='confirmada'?'Confirmada':e==='cancelada'?'Cancelada':'Pendiente';}

function renderCitaHTML(c,isNew=false){
  return`<div class="cc${isNew?' new-cita':''}" id="cc-${c._firebaseKey}">
    <div class="cc-bar ${barC(c.estado)}"></div>
    <div>
      <div class="cc-nom">${c.nombre}</div>
      <div class="cc-inf">${c.servicio} · ${c.estilista}</div>
      <div class="cc-inf">${c.tel||'—'}</div>
      <span class="badge ${badgeC(c.estado)}">${badgeL(c.estado)}</span>
      <div class="acts">
        ${c.estado==='pendiente'?`<button class="ab ok" onclick="cambiar('${c._firebaseKey}','confirmada')">✓ Confirmar</button>`:''}
        ${c.estado!=='cancelada'?`<button class="ab del" onclick="cambiar('${c._firebaseKey}','cancelada')">✕ Cancelar</button>`:''}
        ${c.estado==='cancelada'?`<button class="ab" onclick="cambiar('${c._firebaseKey}','pendiente')">↺ Reactivar</button>`:''}
      </div>
    </div>
    <div>
      <div class="cc-hora">${c.horaInicio}</div>
      <div class="cc-fin">hasta ${c.horaFin}</div>
      <div class="cc-precio">${c.precio||'—'}</div>
    </div>
  </div>`;
}

function renderAll(){ renderHoy(); renderAgenda(); renderEquipo(); renderTimeline(); }

function renderHoy(){
  const hoy=hoyStr();
  const hoyC=CITAS.filter(c=>c.fecha===hoy);
  const act=hoyC.filter(c=>c.estado!=='cancelada');
  const conf=hoyC.filter(c=>c.estado==='confirmada').length;
  const pend=hoyC.filter(c=>c.estado==='pendiente').length;
  const ing=act.reduce((s,c)=>{const p=parseInt((c.precio||'0').replace(/\D/g,''));return s+p;},0);
  document.getElementById('metricas').innerHTML=`
    <div class="met"><div class="met-lbl">Citas hoy</div><div class="met-val g">${act.length}</div><div class="met-sub">programadas</div></div>
    <div class="met"><div class="met-lbl">Confirmadas</div><div class="met-val">${conf}</div><div class="met-sub">listas</div></div>
    <div class="met"><div class="met-lbl">Pendientes</div><div class="met-val">${pend}</div><div class="met-sub">por confirmar</div></div>
    <div class="met"><div class="met-lbl">Ingresos est.</div><div class="met-val g">$${Math.round(ing/1000)}k</div><div class="met-sub">del día</div></div>`;
  const sorted=[...hoyC].sort((a,b)=>a.horaInicio.localeCompare(b.horaInicio));
  document.getElementById('citas-hoy').innerHTML=sorted.length
    ?sorted.map(c=>renderCitaHTML(c)).join('')
    :`<div class="empty">No hay citas para hoy</div>`;
}

function renderAgenda(){
  let lista=CITAS.filter(c=>{
    const me=filtro==='todas'||c.estado===filtro;
    const mb=busq===''||c.nombre.toLowerCase().includes(busq)||c.servicio.toLowerCase().includes(busq);
    return me&&mb;
  }).sort((a,b)=>a.horaInicio.localeCompare(b.horaInicio));
  document.getElementById('lista-agenda').innerHTML=lista.length
    ?lista.map(c=>renderCitaHTML(c)).join('')
    :`<div class="empty">No hay citas con ese filtro</div>`;
}

function renderEquipo(){
  const STAFF=[{name:'Ana',role:'Dueña',ini:'AN',bg:'rgba(201,168,76,0.15)',tc:'#C9A84C'},{name:'Lucía',role:'Estilista',ini:'LU',bg:'rgba(212,83,126,0.12)',tc:'#993556'},{name:'Camila',role:'Estilista',ini:'CA',bg:'rgba(55,138,221,0.12)',tc:'#185FA5'}];
  const hoy=hoyStr();
  document.getElementById('equipo').innerHTML=STAFF.map(s=>{
    const citas=CITAS.filter(c=>c.estilista===s.name&&c.fecha===hoy&&c.estado!=='cancelada');
    const ing=citas.reduce((a,c)=>{return a+parseInt((c.precio||'0').replace(/\D/g,''));},0);
    return`<div class="staff-card">
      <div class="sr"><div class="sl2">
        <div class="sa" style="background:${s.bg};color:${s.tc};">${s.ini}</div>
        <div><div class="sn">${s.name}</div><div class="srl">${s.role}</div></div>
      </div>
      <div style="text-align:right"><div class="sv">${citas.length}</div><div class="sl3">citas hoy</div></div></div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;">Ingresos: <span style="color:var(--gold);">$${ing.toLocaleString('es-CO')}</span></div>
      <div style="margin-top:8px;">${citas.map(c=>`<div style="font-size:12px;color:var(--muted);padding:3px 0;">${c.horaInicio} · ${c.servicio} · <span class="badge ${badgeC(c.estado)}" style="font-size:9px;">${badgeL(c.estado)}</span></div>`).join('')||'<div style="font-size:12px;color:var(--muted);padding:3px 0;">Sin citas para hoy</div>'}</div>
    </div>`;
  }).join('');
}

function renderTimeline(){
  const base=[{t:'08:00',x:'Salón abierto',s:'Lunes – Viernes 08:00–17:00 · Sábado 07:00–17:00'},{t:'Ayer',x:'7 citas completadas',s:'Ingresos: $345.000'}];
  const all=[...LOG,...base];
  document.getElementById('timeline').innerHTML=all.map(e=>`
    <div class="tli"><div class="tld"></div>
      <div class="tlt">${e.t}</div>
      <div class="tlx">${e.x}</div>
      <div class="tls">${e.s}</div>
    </div>`).join('');
}

async function cambiar(key, nuevoEstado){
  const c=CITAS.find(c=>c._firebaseKey===key);
  if(!c) return;
  const labels={confirmada:'confirmada',cancelada:'cancelada',pendiente:'reactivada'};
  if(window._updateCita){ await window._updateCita(key,{estado:nuevoEstado}); }
  else { c.estado=nuevoEstado; renderAll(); }
  LOG.unshift({t:hora(),x:'Cita '+labels[nuevoEstado],s:c.nombre+' · '+c.servicio});
  toast('Cita de '+c.nombre+' '+labels[nuevoEstado]+' ✓');
  renderTimeline();
}

function buscar(v){busq=v.toLowerCase();renderAgenda();}
function setFiltro(f,btn){filtro=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderAgenda();}
function showP(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.nt').forEach(b=>b.classList.remove('on'));document.getElementById('p-'+id).classList.add('on');btn.classList.add('on');if(id==='agenda')renderAgenda();}
function abrirModal(){document.getElementById('modal').classList.add('open');}
function cerrarModal(){document.getElementById('modal').classList.remove('open');}

async function guardarCita(){
  const nom=document.getElementById('m-nom').value.trim();
  const tel=document.getElementById('m-tel').value.trim();
  const svc=document.getElementById('m-svc').value;
  const est=document.getElementById('m-est').value;
  const horaV=document.getElementById('m-hora').value;
  const estadoV=document.getElementById('m-estado').value;
  if(!nom||!svc||!horaV){alert('Completa nombre, servicio y hora.');return;}
  const mins=DURACION[svc]||60;
  const precio='$'+PRECIOS[svc].toLocaleString('es-CO');
  const fin=addMins(horaV,mins);
  const nueva={nombre:nom,tel:tel||'—',servicio:svc,estilista:est,fecha:hoyStr(),horaInicio:horaV,horaFin:fin,estado:estadoV,precio,creadoEn:new Date().toISOString()};
  if(window._pushCita){ await window._pushCita(nueva); }
  else {
    nueva._firebaseKey='m-'+Date.now();
    CITAS.push(nueva); renderAll();
  }
  LOG.unshift({t:hora(),x:'Cita agregada manualmente',s:nom+' · '+svc+' · '+horaV});
  cerrarModal();
  toast('Cita de '+nom+' agregada ✓');
  renderTimeline();
  document.getElementById('m-nom').value='';
  document.getElementById('m-tel').value='';
  document.getElementById('m-svc').value='';
  document.getElementById('m-hora').value='09:00';
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

document.getElementById('inp-user').focus();
</script>
</body>
</html>
