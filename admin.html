<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visos Keratin — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#a855f7;--gl:#9333ea;--gb:rgba(168,85,247,0.3);--gbb:rgba(168,85,247,0.65);
  --acc:#ec4899;--black:#0f0a1a;--dark:#1a1025;--dark2:#221535;--dark3:#2d1b45;
  --muted:rgba(220,180,255,0.5);--text:#f0e6ff;--r:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 15% 10%,rgba(168,85,247,0.1) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* LOGIN */
#login-screen{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-box{width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-icon{font-size:40px;display:block;margin-bottom:.75rem;}
.login-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:5px;color:#d8b4fe;display:block;}
.login-sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px;display:block;font-style:italic;}
.login-card{background:var(--dark2);border:.5px solid var(--gb);border-radius:10px;padding:1.75rem;}
.login-card h2{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;text-align:center;}
.field{margin-bottom:1.1rem;position:relative;}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.field input{width:100%;background:var(--dark);border:.5px solid var(--gb);border-radius:var(--r);padding:11px 40px 11px 13px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .2s;}
.field input:focus{border-color:#a855f7;}
.field input::placeholder{color:rgba(212,237,217,.2);}
.eye-btn{position:absolute;right:12px;bottom:11px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0;line-height:1;}
.eye-btn:hover{color:var(--text);}
.btn-login{width:100%;padding:12px;background:#a855f7;color:#fff;border:none;border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-top:.5rem;}
.btn-login:hover{opacity:.88;}
.login-error{display:none;text-align:center;font-size:12px;color:#f09595;margin-top:.75rem;}
.login-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:1.25rem;}

/* APP */
#app{display:none;position:relative;z-index:1;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:.5px solid var(--gb);background:var(--dark);}
.tb-logo{display:flex;align-items:center;gap:10px;}
.tb-badge{font-size:20px;}
.tb-name{font-size:14px;font-weight:500;color:#d8b4fe;}
.tb-role{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:5px;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.tb-right{display:flex;align-items:center;gap:1rem;}
.tb-time strong{display:block;font-size:13px;color:var(--text);}
.tb-time span{font-size:11px;color:var(--muted);}
.btn-out{padding:6px 12px;background:transparent;border:.5px solid var(--gb);border-radius:var(--r);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;}
.btn-out:hover{border-color:var(--gbb);color:var(--text);}
.nav{display:flex;border-bottom:.5px solid var(--gb);background:var(--dark);}
.nt{padding:10px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;font-family:'Montserrat',sans-serif;}
.nt:hover{color:var(--text);}
.nt.on{color:#d8b4fe;border-bottom-color:#a855f7;}
.panel{display:none;padding:1.25rem;max-width:900px;margin:0 auto;}
.panel.on{display:block;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.25rem;}
.met{background:var(--dark2);border-radius:var(--r);padding:.9rem;}
.met-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.met-val{font-size:24px;font-weight:500;color:var(--text);}
.met-val.g{color:#d8b4fe;}
.met-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.sec-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:7px;border-bottom:.5px solid var(--gb);}
/* cita card */
.cc{background:var(--dark2);border:.5px solid var(--gb);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:8px;display:grid;grid-template-columns:3px 1fr auto;gap:11px;align-items:start;transition:border-color .2s;}
.cc:hover{border-color:var(--gbb);}
.cc.new-cita{animation:hl 2s ease;}
@keyframes hl{0%{border-color:#d8b4fe;background:rgba(168,85,247,.1);}100%{border-color:var(--gb);background:var(--dark2);}}
.cc-bar{width:3px;border-radius:2px;align-self:stretch;min-height:46px;}
.bar-p{background:var(--acc);}
.bar-c{background:#9333ea;}
.bar-x{background:#a32d2d;}
.cc-nom{font-size:14px;font-weight:400;color:var(--text);margin-bottom:2px;}
.cc-svc{font-size:12px;color:#d8b4fe;margin-bottom:2px;line-height:1.5;font-weight:400;}
.cc-inf{font-size:12px;color:var(--muted);line-height:1.5;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:500;margin-top:4px;}
.bp{background:rgba(201,168,76,.12);color:var(--acc);}
.bc{background:rgba(99,153,34,.15);color:#c084fc;}
.bx{background:rgba(163,45,45,.15);color:#f09595;}
.acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.ab{padding:4px 10px;border-radius:var(--r);border:.5px solid var(--gb);background:transparent;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;font-family:'Montserrat',sans-serif;}
.ab:hover{border-color:var(--gbb);color:var(--text);}
.ab.ok:hover{border-color:#9333ea;color:#c084fc;}
.ab.del:hover{border-color:#a32d2d;color:#f09595;}
.cc-hora{font-size:14px;font-weight:500;color:#d8b4fe;text-align:right;white-space:nowrap;}
.cc-fin{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
/* filtros */
.filter-bar{display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap;}
.fb{padding:5px 12px;border-radius:20px;border:.5px solid var(--gb);background:transparent;font-size:11px;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'Montserrat',sans-serif;}
.fb:hover{border-color:var(--gbb);}
.fb.on{background:rgba(168,85,247,.1);border-color:#a855f7;color:#d8b4fe;}
/* search */
.sw{position:relative;margin-bottom:1rem;}
.sw input{width:100%;background:var(--dark2);border:.5px solid var(--gb);border-radius:var(--r);padding:10px 14px 10px 34px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .2s;}
.sw input:focus{border-color:#a855f7;}
.sw input::placeholder{color:rgba(212,237,217,.2);}
.sw-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px;}
/* staff */
.staff-card{background:var(--dark2);border:.5px solid var(--gb);border-radius:var(--r);padding:1.1rem;margin-bottom:10px;}
.sr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.sl2{display:flex;align-items:center;gap:11px;}
.sa{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;border:.5px solid var(--gb);}
.sn{font-size:14px;font-weight:400;color:var(--text);}
.srl{font-size:11px;color:var(--muted);}
.sv-num{font-size:20px;font-weight:500;color:#d8b4fe;}
.sv-lbl{font-size:11px;color:var(--muted);}
/* timeline */
.tl{position:relative;padding-left:13px;}
.tl::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:var(--gb);}
.tli{position:relative;padding:0 0 1rem 1.1rem;}
.tld{position:absolute;left:-5px;top:4px;width:9px;height:9px;border-radius:50%;border:1.5px solid #a855f7;background:var(--dark);}
.tlt{font-size:10px;color:#d8b4fe;letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase;}
.tlx{font-size:13px;color:var(--text);}
.tls{font-size:11px;color:var(--muted);}
/* modal */
.modal-wrap{display:none;background:rgba(0,0,0,.75);position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;}
.modal-wrap.open{display:flex;}
.modal{background:var(--dark2);border:.5px solid var(--gb);border-radius:10px;padding:1.5rem;width:100%;max-width:400px;margin:1rem;}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:#d8b4fe;margin-bottom:1.1rem;}
.mfield{margin-bottom:.9rem;}
.mfield label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.mfield input,.mfield select{width:100%;background:var(--dark);border:.5px solid var(--gb);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .2s;}
.mfield input:focus,.mfield select:focus{border-color:#a855f7;}
.mfield select option{background:var(--dark2);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-btns{display:flex;gap:8px;margin-top:1.1rem;}
.btn-g{flex:1;padding:11px;background:#a855f7;color:#fff;border:none;border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.btn-g:hover{opacity:.88;}
.btn-gh{flex:1;padding:11px;background:transparent;color:var(--muted);border:.5px solid var(--gb);border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-gh:hover{border-color:var(--gbb);color:var(--text);}
.btn-add{padding:8px 16px;background:rgba(168,85,247,.08);border:.5px solid #a855f7;border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#d8b4fe;cursor:pointer;transition:all .2s;margin-bottom:1.1rem;}
.btn-add:hover{background:rgba(168,85,247,.18);}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--dark2);border:.5px solid #a855f7;border-radius:var(--r);padding:11px 16px;font-size:13px;color:var(--text);z-index:999;display:none;}
.toast.show{display:block;animation:fi .3s ease;}
.toast.cancel-toast{border-color:#a32d2d;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="login-icon">✨</span>
      <span class="login-name">Visos Keratin</span>
      <span class="login-sub">¡Donde tu cabello encuentra su mejor versión!</span>
    </div>
    <div class="login-card">
      <h2>Acceso privado</h2>
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="inp-user" placeholder="usuario" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
        <button class="eye-btn" onclick="togglePass()" id="eyeBtn" type="button">👁️</button>
      </div>
      <button class="btn-login" onclick="login()">Ingresar →</button>
      <div class="login-error" id="login-err">Usuario o contraseña incorrectos</div>
    </div>
    <p class="login-hint">Solo para uso del salón Visos Keratin</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">
      <span class="tb-badge">✨</span>
      <div><div class="tb-name">Visos Keratin</div><div class="tb-role"><span class="live-dot"></span>En vivo</div></div>
    </div>
    <div class="tb-right">
      <div class="tb-time"><strong id="fecha-top"></strong><span id="hora-top"></span></div>
      <button class="btn-out" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="nav">
    <button class="nt on" onclick="showP('hoy',this)">Hoy</button>
    <button class="nt" onclick="showP('agenda',this)">Agenda</button>
    <button class="nt" onclick="showP('equipo',this)">Equipo</button>
    <button class="nt" onclick="showP('historial',this)">Historial</button>
  </div>

  <!-- HOY -->
  <div class="panel on" id="p-hoy">
    <div class="metrics" id="metricas"></div>
    <button class="btn-add" onclick="abrirModal()">+ Nueva cita manual</button>
    <p class="sec-title">Citas de hoy — en tiempo real</p>
    <div id="citas-hoy"></div>
  </div>

  <!-- AGENDA -->
  <div class="panel" id="p-agenda">
    <div class="sw"><span class="sw-ico">🔍</span><input type="text" placeholder="Buscar clienta o servicio..." oninput="buscar(this.value)"/></div>
    <div class="filter-bar">
      <button class="fb on" onclick="setFiltro('todas',this)">Todas</button>
      <button class="fb" onclick="setFiltro('pendiente',this)">Pendientes</button>
      <button class="fb" onclick="setFiltro('confirmada',this)">Confirmadas</button>
      <button class="fb" onclick="setFiltro('cancelada',this)">Canceladas</button>
    </div>
    <div id="lista-agenda"></div>
  </div>

  <!-- EQUIPO -->
  <div class="panel" id="p-equipo">
    <p class="sec-title">Equipo — resumen del día</p>
    <div id="equipo"></div>
  </div>

  <!-- HISTORIAL -->
  <div class="panel" id="p-historial">
    <p class="sec-title">Actividad reciente</p>
    <div class="tl" id="timeline"></div>
  </div>
</div>

<!-- MODAL nueva cita -->
<div class="modal-wrap" id="modal">
  <div class="modal">
    <h3>Nueva cita manual</h3>
    <div class="mfield"><label>Nombre clienta *</label><input type="text" id="m-nom" placeholder="Ej: María García"/></div>
    <div class="mfield"><label>Teléfono</label><input type="tel" id="m-tel" placeholder="+57 300 000 0000"/></div>
    <div class="mfield"><label>Servicios</label>
      <select id="m-svc"><option value="">— Selecciona —</option>
        <option>Corte de cabello</option><option>Tinte / color</option><option>Peinado / brushing</option>
        <option>Manicure / pedicure</option><option>Tratamiento capilar</option><option>Cejas / depilación</option>
        <option>Hidratación</option><option>Repo</option><option>Pisado</option><option>Planchado</option><option>Keratina</option>
      </select>
    </div>
    <div class="mfield"><label>Estilista</label>
      <select id="m-est"><option>Ana</option><option>Lucía</option><option>Camila</option></select>
    </div>
    <div class="two-col">
      <div class="mfield"><label>Hora inicio</label><input type="time" id="m-hora" value="09:00"/></div>
      <div class="mfield"><label>Estado</label>
        <select id="m-estado"><option value="pendiente">Pendiente</option><option value="confirmada">Confirmada</option></select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-gh" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-g" onclick="guardarCita()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4TtVL7HM5ZQUGnqQZMCrTz_xtipUmU1Y",
  authDomain: "visos-keratin.firebaseapp.com",
  databaseURL: "https://visos-keratin-default-rtdb.firebaseio.com",
  projectId: "visos-keratin",
  storageBucket: "visos-keratin.firebasestorage.app",
  messagingSenderId: "793810207482",
  appId: "1:793810207482:web:80f771072a782b085c3f43"
};

let db=null;
try{const app=initializeApp(firebaseConfig);db=getDatabase(app);}catch(e){console.warn("Firebase:",e);}

window._listenCitas=function(cb){
  if(!db){cb([]);return;}
  onValue(ref(db,'citas'),snap=>{
    if(!snap.exists()){cb([]);return;}
    cb(Object.entries(snap.val()).map(([k,v])=>({...v,_key:k})));
  });
};
window._updateCita=function(key,campos){
  if(!db||!key)return Promise.resolve();
  return update(ref(db,'citas/'+key),campos);
};
window._pushCita=function(cita){
  if(!db)return Promise.resolve(null);
  return push(ref(db,'citas'),cita).then(r=>r.key).catch(()=>null);
};
</script>

<script>
const CREDS={user:'visos',pass:'keratin2025'};
const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DUR={'Corte de cabello':45,'Tinte / color':120,'Peinado / brushing':60,'Manicure / pedicure':75,'Tratamiento capilar':90,'Cejas / depilación':30,'Hidratación':60,'Repo':90,'Pisado':60,'Planchado':45,'Keratina':150};

function hoyStr(){const n=new Date();return DIAS[n.getDay()]+' '+n.getDate()+'/'+(n.getMonth()+1)+'/'+n.getFullYear();}

const DEMO=[
  {_key:'d1',nombre:'Valentina Ruiz',tel:'+573001234567',servicios:'Keratina',estilista:'Ana',fecha:hoyStr(),horaInicio:'08:00',horaFin:'10:30',estado:'confirmada'},
  {_key:'d2',nombre:'Sofía Martínez',tel:'+573107654321',servicios:'Tinte / color, Peinado / brushing',estilista:'Lucía',fecha:hoyStr(),horaInicio:'08:30',horaFin:'11:00',estado:'pendiente'},
  {_key:'d3',nombre:'Isabella Torres',tel:'+573205551234',servicios:'Corte de cabello',estilista:'Camila',fecha:hoyStr(),horaInicio:'09:00',horaFin:'09:45',estado:'confirmada'},
];

let CITAS=[];
let filtro='todas',busq='';
const LOG=[];

function togglePass(){
  const inp=document.getElementById('inp-pass');
  inp.type=inp.type==='password'?'text':'password';
  document.getElementById('eyeBtn').textContent=inp.type==='password'?'👁️':'🙈';
}

function login(){
  const u=document.getElementById('inp-user').value.trim();
  const p=document.getElementById('inp-pass').value;
  if(u===CREDS.user&&p===CREDS.pass){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }else{document.getElementById('login-err').style.display='block';document.getElementById('inp-pass').value='';}
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('inp-user').value='';
  document.getElementById('inp-pass').value='';
  document.getElementById('login-err').style.display='none';
}

function initApp(){
  tickReloj();setInterval(tickReloj,15000);
  if(window._listenCitas){
    window._listenCitas(function(citas){
      const primera=CITAS.length===0;
      if(citas.length===0&&primera){CITAS=[...DEMO];}
      else if(citas.length>0){
        if(!primera){
          const keys=new Set(CITAS.map(c=>c._key));
          citas.filter(c=>!keys.has(c._key)).forEach(c=>{
            // detectar cancelaciones desde cliente
            if(c.estado==='cancelada'){
              toast('❌ Cita cancelada: '+c.nombre+' · '+c.servicios,true);
              LOG.unshift({t:hora(),x:'Clienta canceló su cita',s:c.nombre+' · '+(c.servicios||'')});
            } else {
              toast('✨ Nueva cita: '+c.nombre+' – '+(c.servicios||''));
              LOG.unshift({t:hora(),x:'Nueva cita agendada',s:c.nombre+' · '+(c.servicios||'')+' · '+c.horaInicio});
            }
          });
          // detectar cambios de estado (cancelación desde cliente)
          citas.forEach(c=>{
            const ant=CITAS.find(a=>a._key===c._key);
            if(ant&&ant.estado!=='cancelada'&&c.estado==='cancelada'){
              toast('❌ Cita cancelada por la clienta: '+c.nombre,true);
              LOG.unshift({t:hora(),x:'Clienta canceló su cita',s:c.nombre+' · '+(c.servicios||'')});
            }
          });
        }
        CITAS=citas;
      }
      renderAll();
    });
  }else{CITAS=[...DEMO];renderAll();}
}

function hora(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function tickReloj(){
  const n=new Date();
  document.getElementById('fecha-top').textContent=DIAS[n.getDay()]+' '+n.getDate()+' '+MESES[n.getMonth()];
  document.getElementById('hora-top').textContent=hora();
}

function addMins(t,m){const[h,mn]=t.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');}
function barC(e){return e==='confirmada'?'bar-c':e==='cancelada'?'bar-x':'bar-p';}
function badgeC(e){return e==='confirmada'?'bc':e==='cancelada'?'bx':'bp';}
function badgeL(e){return e==='confirmada'?'Confirmada':e==='cancelada'?'Cancelada':'Pendiente';}

function renderCitaHTML(c){
  // Usa 'servicios' (plural) tal como viene de Firebase
  const svcText=c.servicios||c.servicio||'—';
  return`<div class="cc" id="cc-${c._key}">
    <div class="cc-bar ${barC(c.estado)}"></div>
    <div>
      <div class="cc-nom">${c.nombre}</div>
      <div class="cc-svc">🌿 ${svcText}</div>
      <div class="cc-inf">👩‍🎨 ${c.estilista} &nbsp;·&nbsp; 📞 ${c.tel||c.telefono||'—'}</div>
      <span class="badge ${badgeC(c.estado)}">${badgeL(c.estado)}</span>
      <div class="acts">
        ${c.estado==='pendiente'?`<button class="ab ok" onclick="cambiar('${c._key}','confirmada')">✓ Confirmar</button>`:''}
        ${c.estado!=='cancelada'?`<button class="ab del" onclick="cambiar('${c._key}','cancelada')">✕ Cancelar</button>`:''}
        ${c.estado==='cancelada'?`<button class="ab" onclick="cambiar('${c._key}','pendiente')">↺ Reactivar</button>`:''}
      </div>
    </div>
    <div>
      <div class="cc-hora">${c.horaInicio}</div>
      <div class="cc-fin">hasta ${c.horaFin}</div>
    </div>
  </div>`;
}

function renderAll(){renderHoy();renderAgenda();renderEquipo();renderTimeline();}

function renderHoy(){
  const hoy=hoyStr();
  const hoyC=CITAS.filter(c=>c.fecha===hoy);
  const act=hoyC.filter(c=>c.estado!=='cancelada');
  document.getElementById('metricas').innerHTML=`
    <div class="met"><div class="met-lbl">Citas hoy</div><div class="met-val g">${act.length}</div><div class="met-sub">programadas</div></div>
    <div class="met"><div class="met-lbl">Confirmadas</div><div class="met-val">${hoyC.filter(c=>c.estado==='confirmada').length}</div><div class="met-sub">listas</div></div>
    <div class="met"><div class="met-lbl">Pendientes</div><div class="met-val">${hoyC.filter(c=>c.estado==='pendiente').length}</div><div class="met-sub">por confirmar</div></div>
    <div class="met"><div class="met-lbl">Canceladas</div><div class="met-val">${hoyC.filter(c=>c.estado==='cancelada').length}</div><div class="met-sub">hoy</div></div>`;
  const sorted=[...hoyC].sort((a,b)=>a.horaInicio.localeCompare(b.horaInicio));
  document.getElementById('citas-hoy').innerHTML=sorted.length?sorted.map(renderCitaHTML).join(''):`<div class="empty">No hay citas para hoy</div>`;
}

function renderAgenda(){
  let lista=CITAS.filter(c=>{
    const me=filtro==='todas'||c.estado===filtro;
    const svcText=(c.servicios||c.servicio||'').toLowerCase();
    const mb=busq===''||c.nombre.toLowerCase().includes(busq)||svcText.includes(busq);
    return me&&mb;
  }).sort((a,b)=>a.horaInicio.localeCompare(b.horaInicio));
  document.getElementById('lista-agenda').innerHTML=lista.length?lista.map(renderCitaHTML).join(''):`<div class="empty">No hay citas con ese filtro</div>`;
}

function renderEquipo(){
  const STAFF=[
    {name:'Ana',role:'Dueña',ini:'AN',bg:'rgba(45,110,78,0.2)',tc:'#d8b4fe'},
    {name:'Lucía',role:'Estilista',ini:'LU',bg:'rgba(201,168,76,0.12)',tc:'#e8c97a'},
    {name:'Camila',role:'Estilista',ini:'CA',bg:'rgba(55,138,221,0.12)',tc:'#93c5fd'},
  ];
  const hoy=hoyStr();
  document.getElementById('equipo').innerHTML=STAFF.map(s=>{
    const citas=CITAS.filter(c=>c.estilista===s.name&&c.fecha===hoy&&c.estado!=='cancelada');
    return`<div class="staff-card">
      <div class="sr"><div class="sl2">
        <div class="sa" style="background:${s.bg};color:${s.tc};">${s.ini}</div>
        <div><div class="sn">${s.name}</div><div class="srl">${s.role}</div></div>
      </div>
      <div style="text-align:right"><div class="sv-num">${citas.length}</div><div class="sv-lbl">citas hoy</div></div></div>
      <div style="margin-top:8px;">${citas.map(c=>`<div style="font-size:12px;color:var(--muted);padding:3px 0;">${c.horaInicio} · <span style="color:#d8b4fe;">${c.servicios||c.servicio||'—'}</span> · <span class="badge ${badgeC(c.estado)}" style="font-size:9px;">${badgeL(c.estado)}</span></div>`).join('')||'<div style="font-size:12px;color:var(--muted);">Sin citas hoy</div>'}</div>
    </div>`;
  }).join('');
}

function renderTimeline(){
  const base=[{t:'08:00',x:'Salón abierto',s:'Lun–Vie 08:00–17:00 · Sáb 07:00–17:00'}];
  const all=[...LOG,...base];
  document.getElementById('timeline').innerHTML=all.map(e=>`
    <div class="tli"><div class="tld"></div>
      <div class="tlt">${e.t}</div><div class="tlx">${e.x}</div><div class="tls">${e.s}</div>
    </div>`).join('');
}

async function cambiar(key,nuevoEstado){
  const c=CITAS.find(c=>c._key===key);if(!c)return;
  const labels={confirmada:'confirmada',cancelada:'cancelada',pendiente:'reactivada'};
  if(window._updateCita)await window._updateCita(key,{estado:nuevoEstado});
  else{c.estado=nuevoEstado;renderAll();}
  LOG.unshift({t:hora(),x:'Cita '+labels[nuevoEstado],s:c.nombre+' · '+(c.servicios||'')});
  toast((nuevoEstado==='cancelada'?'❌':'✓')+' Cita de '+c.nombre+' '+labels[nuevoEstado],nuevoEstado==='cancelada');
  renderTimeline();
}

function buscar(v){busq=v.toLowerCase();renderAgenda();}
function setFiltro(f,btn){filtro=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderAgenda();}
function showP(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.nt').forEach(b=>b.classList.remove('on'));document.getElementById('p-'+id).classList.add('on');btn.classList.add('on');if(id==='agenda')renderAgenda();}
function abrirModal(){document.getElementById('modal').classList.add('open');}
function cerrarModal(){document.getElementById('modal').classList.remove('open');}

async function guardarCita(){
  const nom=document.getElementById('m-nom').value.trim();
  const tel=document.getElementById('m-tel').value.trim();
  const svc=document.getElementById('m-svc').value;
  const est=document.getElementById('m-est').value;
  const horaV=document.getElementById('m-hora').value;
  const estadoV=document.getElementById('m-estado').value;
  if(!nom||!svc||!horaV){alert('Completa nombre, servicio y hora.');return;}
  const mins=DUR[svc]||60;
  const fin=addMins(horaV,mins);
  const nueva={nombre:nom,tel:tel||'—',servicios:svc,estilista:est,fecha:hoyStr(),horaInicio:horaV,horaFin:fin,estado:estadoV,creadoEn:new Date().toISOString()};
  if(window._pushCita)await window._pushCita(nueva);
  else{nueva._key='m-'+Date.now();CITAS.push(nueva);renderAll();}
  LOG.unshift({t:hora(),x:'✨ Cita manual agregada',s:nom+' · '+svc+' · '+horaV});
  cerrarModal();toast('✨ Cita de '+nom+' agregada');renderTimeline();
  document.getElementById('m-nom').value='';document.getElementById('m-tel').value='';
  document.getElementById('m-svc').value='';document.getElementById('m-hora').value='09:00';
}

function toast(msg,esCancel=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(esCancel?' cancel-toast':'');
  setTimeout(()=>t.classList.remove('show'),4000);
}

document.getElementById('inp-user').focus();
</script>
